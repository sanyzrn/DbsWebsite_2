name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
        env:
          # CI has no Formspree secret — deliberately keep mailto fallback for the gate.
          ALLOW_MAILTO_CONTACT_FALLBACK: "1"
      # Post-build: internal links + canonical/OG vs SITE_URL (extends check-urls.mjs)
      - run: npm run check:dist
      # axe-core + jsdom against key prerendered routes (see scripts/check-a11y.mjs)
      - run: npm run check:a11y
      # Initial JS/CSS gzip ceilings (~150 KiB / ~60 KiB)
      - run: npm run check:bundle
      # Optional live promotion gate (set repo Variable DEPLOY_CHECK_BASE_URL to an https origin)
      - name: check:deploy (live HTTP 404 + noindex + SITE_URL HTTPS)
        if: ${{ vars.DEPLOY_CHECK_BASE_URL != '' }}
        env:
          DEPLOY_CHECK_BASE_URL: ${{ vars.DEPLOY_CHECK_BASE_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check:deploy
