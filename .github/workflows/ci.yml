name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run check:i18n
      - run: npm test -- --run
      - run: npm run build
      # Post-build: internal links + canonical/OG vs SITE_URL (extends check-urls.mjs)
      - run: npm run check:dist
      # axe-core + jsdom against key prerendered routes (see scripts/check-a11y.mjs)
      - run: npm run check:a11y
      # Initial JS/CSS/HTML/font/first-paint gzip ceilings
      - run: npm run check:bundle
      # Optional live promotion gate (set repo Variable DEPLOY_CHECK_BASE_URL to an https origin)
      - name: check:deploy (live HTTP 404 + noindex + SITE_URL HTTPS)
        if: ${{ vars.DEPLOY_CHECK_BASE_URL != '' }}
        env:
          DEPLOY_CHECK_BASE_URL: ${{ vars.DEPLOY_CHECK_BASE_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run check:deploy

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
      - name: PHP syntax check (admin/)
        run: |
          set -euo pipefail
          mapfile -t files < <(find admin -type f -name '*.php')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files under admin/"
            exit 1
          fi
          for f in "${files[@]}"; do
            php -l "$f"
          done
          echo "php -l OK — ${#files[@]} files"
