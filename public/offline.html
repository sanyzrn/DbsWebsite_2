<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d4b483" />
    <title>Offline — Saeed Zarrini</title>
    <link rel="stylesheet" href="/offline.css" />
  </head>
  <body>
    <main class="wrap">
      <p class="kicker">Offline</p>
      <h1 lang="fa">الان آفلاین هستید</h1>
      <p lang="fa">
        اتصال شبکه در دسترس نیست. صفحه‌های ذخیره‌شده را می‌توانید باز کنید؛ برای بقیه، وقتی آنلاین شدید دوباره تلاش کنید.
      </p>
      <h1 class="en" lang="en">You're offline</h1>
      <p lang="en">
        No network right now. Cached pages still work — for anything else, try again once you’re back online.
      </p>
      <div class="actions">
        <button class="primary" type="button" id="offline-retry">Retry / تلاش مجدد</button>
        <a class="ghost" href="/">Home / خانه</a>
      </div>
      <p class="lang"><a href="/en">English</a> · <a href="/">فارسی</a></p>
    </main>
    <script src="/offline.js"></script>
  </body>
</html>
