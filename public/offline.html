<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#bc9463" />
    <title>Offline — Saeed Zarrini</title>
    <style>
      :root {
        --page: #f5f0e8;
        --surface: #fbf9f5;
        --ink: #1c1c1a;
        --ink2: #77736c;
        --line: #ddd5c9;
        --accent: #bc9463;
        --accentdark: #947044;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --page: #151617;
          --surface: #202223;
          --ink: #f1f0ed;
          --ink2: #a7a9a8;
          --line: #343738;
          --accent: #c19e6e;
          --accentdark: #a8875a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        background: var(--page);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, "Segoe UI", Tahoma, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        width: min(36rem, 100%);
        text-align: center;
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 16px;
        padding: 2.25rem 1.5rem 2rem;
      }
      .kicker {
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0;
      }
      h1 {
        margin: 1rem 0 0;
        font-size: clamp(1.6rem, 4vw, 2.25rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.25;
      }
      p {
        margin: 1rem auto 0;
        max-width: 28rem;
        font-size: 15px;
        line-height: 1.85;
        color: var(--ink2);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-top: 1.75rem;
      }
      a,
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        border-radius: 10px;
        height: 48px;
        padding: 0 1.4rem;
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .primary {
        background: var(--accent);
        color: #211a10;
      }
      .primary:hover {
        background: var(--accentdark);
        color: #fff8ee;
      }
      .ghost {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
      }
      .lang {
        margin-top: 1.25rem;
        font-size: 12.5px;
        color: var(--ink2);
      }
      .lang a {
        height: auto;
        padding: 0;
        color: var(--accentdark);
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="kicker">Offline</p>
      <h1 lang="fa">الان آفلاین هستید</h1>
      <p lang="fa">
        اتصال شبکه در دسترس نیست. صفحه‌های ذخیره‌شده را می‌توانید باز کنید؛ برای بقیه، وقتی آنلاین شدید دوباره تلاش کنید.
      </p>
      <h1 lang="en" style="margin-top: 1.75rem; font-size: clamp(1.35rem, 3.5vw, 1.85rem)">You're offline</h1>
      <p lang="en">
        No network right now. Cached pages still work — for anything else, try again once you’re back online.
      </p>
      <div class="actions">
        <button class="primary" type="button" onclick="location.reload()">Retry / تلاش مجدد</button>
        <a class="ghost" href="/">Home / خانه</a>
      </div>
      <p class="lang"><a href="/en">English</a> · <a href="/">فارسی</a></p>
    </main>
  </body>
</html>
